# VisionTriage Conda Environment
# Create with: conda env create -f environment.yml
# Activate with: conda activate visiontriage

name: visiontriage

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.10.20

  # PyTorch
  - pytorch=2.5.1
  - torchvision=0.20.1
  - pytorch-cuda=12.4

  # Computer Vision
  - opencv>=4.8.0
  - pillow>=10.0.0

  # Data Science
  - numpy>=1.24.0
  - pandas>=2.0.0
  - scikit-learn>=1.3.0
  - scipy>=1.11.0

  # Configuration & Utilities
  - pyyaml>=6.0
  - tqdm>=4.65.0
  - matplotlib>=3.7.0
  - seaborn>=0.12.0

  # Logging
  - tensorboard>=2.14.0

  # Statistics
  - statsmodels>=0.14.0

  # Pip-only packages
  - pip:
    - statsmodels>=0.14.0