# VisionTriage Conda Environment Setup
# Run this with: conda env create -f environment.yml

name: visiontriage

channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.11

  # PyTorch and Vision
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - pytorch-cuda=12.1

  # Data Science
  - numpy>=1.24.0
  - pandas>=2.0.0
  - scikit-learn>=1.3.0
  - scipy>=1.10.0

  # Image Processing
  - opencv>=4.8.0
  - pillow>=10.0.0

  # Deep Learning Tools
  - pytorch-lightning>=2.0.0
  - tensorboard>=2.13.0

  # Utilities
  - pyyaml>=6.0
  - tqdm>=4.65.0
  - einops>=0.6.1
  - matplotlib>=3.7.0
  - seaborn>=0.12.0

  # Kaggle
  - pip
  - pip:
      - kaggle>=1.5.16
      - albumentations>=1.3.1
      - timm>=0.9.2
